name: Build Desktop App

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions tab
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller playwright pillow
          python -m playwright install chromium

      - name: Build Windows exe
        run: python app/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catom-Windows
          path: dist/Catom/

      - name: Zip for release
        if: github.event_name == 'release'
        run: python -c "import shutil; shutil.make_archive('dist/Catom-Windows', 'zip', 'dist', 'Catom')"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} "dist/Catom-Windows.zip" --clobber

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller playwright pillow
          python -m playwright install chromium

      - name: Build macOS app
        run: python app/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catom-macOS
          path: dist/Catom.app/

      - name: Upload DMG to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} "dist/Catom.dmg" --clobber
