name: Build Desktop App

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install pywebview pyinstaller playwright pillow pdfplumber openpyxl
          python -m playwright install chromium

      - name: Install NSIS (for the .exe installer wrapper)
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          # Verify
          & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Bake feedback uploader R2 credentials into app/feedback_credentials.py
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        shell: pwsh
        run: |
          $content = @"
          # Auto-generated by CI on $(Get-Date -Format o). Do not edit by hand.
          R2_ACCESS_KEY_ID:     str = "$env:R2_ACCESS_KEY_ID"
          R2_SECRET_ACCESS_KEY: str = "$env:R2_SECRET_ACCESS_KEY"
          R2_ENDPOINT_URL:      str = "$env:R2_ENDPOINT_URL"
          R2_BUCKET:            str = "$env:R2_BUCKET"
          "@
          Set-Content -Path app/feedback_credentials.py -Value $content
          Write-Host "Baked feedback credentials into app/feedback_credentials.py"

      - name: Build PyInstaller --onedir output (dist/Catom/)
        run: python app/build.py

      - name: Read version from app/__version__.py
        id: version
        shell: pwsh
        run: |
          $line = (Get-Content app/__version__.py | Select-String '__version__\s*=').Line
          $ver  = ($line -replace '.*"([^"]+)".*', '$1').Trim()
          if (-not $ver) { throw "Could not parse __version__" }
          Write-Output "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: $ver"

      - name: Build NSIS installer (Catom-Setup-vX.Y.Z.exe)
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DPRODUCT_VERSION=$ver installer/Catom.nsi
          if (-not (Test-Path "installer/Catom-Setup-v$ver.exe")) {
            throw "NSIS did not produce Catom-Setup-v$ver.exe"
          }

      - name: Upload raw PyInstaller payload (debugging only)
        uses: actions/upload-artifact@v4
        with:
          name: Catom-Windows-payload
          path: dist/Catom/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catom-Setup
          path: installer/Catom-Setup-v${{ steps.version.outputs.version }}.exe

      # ---------------- Release publishing (only on tagged release) ----------------

      - name: Attach installer to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          gh release upload ${{ github.event.release.tag_name }} "installer/Catom-Setup-v$ver.exe" --clobber

      - name: Publish installer + latest.json to Cloudflare R2
        if: github.event_name == 'release' && env.R2_ACCESS_KEY_ID != ''
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $exe = "installer/Catom-Setup-v$ver.exe"
          $notes = "${{ github.event.release.body }}".Replace("`r`n", " ").Replace("`n", " ")
          if (-not $notes) { $notes = "Bug fixes and improvements." }

          # 1. Upload the installer
          aws s3 cp $exe "s3://$env:R2_BUCKET/catom/Catom-Setup-v$ver.exe" `
            --endpoint-url $env:R2_ENDPOINT_URL `
            --content-type "application/octet-stream" `
            --cache-control "public, max-age=31536000, immutable"

          # 2. Generate + upload latest.json — the feed the app polls
          $feed = @{
            version = $ver
            url     = "https://updates.aisimple.co/catom/Catom-Setup-v$ver.exe"
            notes   = $notes
            released_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          } | ConvertTo-Json -Compress
          Set-Content -Path latest.json -Value $feed -NoNewline

          aws s3 cp latest.json "s3://$env:R2_BUCKET/catom/latest.json" `
            --endpoint-url $env:R2_ENDPOINT_URL `
            --content-type "application/json" `
            --cache-control "public, max-age=300"

          Write-Host "Published v$ver to R2."
          Write-Host "Update feed: https://updates.aisimple.co/catom/latest.json"

      - name: Note when R2 publish was skipped
        if: github.event_name == 'release' && env.R2_ACCESS_KEY_ID == ''
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: echo "Skipping R2 publish — R2_ACCESS_KEY_ID secret not configured. See installer/README-DEPLOY.md."

  # Mac build is kept for Andrew's personal dev use only — no auto-update path
  # on Mac yet. Clients are Windows-only.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller playwright pillow pdfplumber openpyxl
          python -m playwright install chromium

      - name: Build macOS app
        run: python app/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catom-macOS
          path: dist/Catom.app/

      - name: Upload DMG to release
        if: github.event_name == 'release' && hashFiles('dist/Catom.dmg') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} "dist/Catom.dmg" --clobber
